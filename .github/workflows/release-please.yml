name: "Release Please"

# Run on every push to main to track changes
on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # Analyze commits since last release and create/update a release PR
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
